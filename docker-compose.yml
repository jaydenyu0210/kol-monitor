services:
  db:
    image: postgres:16-alpine
    container_name: kol-monitor-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-kol_monitor}
      POSTGRES_USER: ${DB_USER:-node}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: kol-monitor-app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "3001:${API_PORT:-3000}"
    volumes:
      - .:/app
      - /app/.credentials # Prevent overwriting local credentials if using volumes

volumes:
  postgres_data:
