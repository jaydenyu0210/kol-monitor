<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOL Monitor Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
    }

    .card-glow {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      transition: all 0.2s;
    }

    .tab-active {
      background: #3b82f6;
      color: white;
    }

    .tab-inactive {
      background: #1e293b;
      color: #94a3b8;
    }

    .tab-inactive:hover {
      background: #334155;
    }

    .table-row:hover {
      background: #334155;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-ai {
      background: #7c3aed20;
      color: #a78bfa;
    }

    .badge-tech {
      background: #059b9520;
      color: #2dd4bf;
    }

    .badge-vc {
      background: #f59e0b20;
      color: #fbbf24;
    }

    .badge-product {
      background: #3b82f620;
      color: #60a5fa;
    }

    .badge-journalism {
      background: #ef444420;
      color: #f87171;
    }

    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
    }

    .scrollbar-thin::-webkit-scrollbar-track {
      background: #1e293b;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }

    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .modal-overlay {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="min-h-screen">

  <!-- Auth handled by Supabase — redirect to login.html if not authenticated -->
  <div id="loginOverlay" class="fixed inset-0 bg-slate-950 z-[200] flex items-center justify-center p-4 hidden">
    <div class="text-center text-white">
      <div class="animate-pulse text-lg">Checking authentication...</div>
    </div>
  </div>

  <div id="app" class="max-w-7xl mx-auto px-4 py-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-white flex items-center gap-3">
          <span class="text-3xl">📡</span> KOL Monitor Dashboard
        </h1>
        <p class="text-sm text-slate-400 mt-1">LinkedIn & Twitter KOL Tracking System</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="lastUpdate" class="text-xs text-slate-500"></span>
        <button onclick="refreshAll()"
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition">
          🔄 Refresh
        </button>
        <button onclick="showAddKol()"
          class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition">
          + Add KOL
        </button>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="card card-glow stat-card p-4 cursor-pointer" onclick="switchTab('overview')">
        <div class="text-slate-400 text-xs font-medium mb-1">TOTAL KOLs</div>
        <div id="statKols" class="text-2xl font-bold text-white">-</div>
        <div class="text-xs text-emerald-400 mt-1">● Active</div>
      </div>
      <div class="card card-glow stat-card p-4 cursor-pointer" onclick="switchTab('posts')">
        <div class="text-slate-400 text-xs font-medium mb-1">POSTS TODAY</div>
        <div id="statPosts" class="text-2xl font-bold text-white">-</div>
        <div id="statTotalPosts" class="text-xs text-slate-500 mt-1">total: -</div>
      </div>
      <div class="card card-glow stat-card p-4 cursor-pointer" onclick="switchTab('interactions')">
        <div class="text-slate-400 text-xs font-medium mb-1">INTERACTIONS TODAY</div>
        <div id="statInteractions" class="text-2xl font-bold text-white">-</div>
        <div class="text-xs text-blue-400 mt-1">comments & likes</div>
      </div>
      <div class="card card-glow stat-card p-4 cursor-pointer" onclick="switchTab('connections')">
        <div class="text-slate-400 text-xs font-medium mb-1">CONNECTION CHANGES</div>
        <div id="statConnections" class="text-2xl font-bold text-white">-</div>
        <div class="text-xs text-amber-400 mt-1">follow/unfollow</div>
      </div>
    </div>

    <!-- Tabs -->

    <div class="flex gap-2 mb-6 flex-wrap">
      <button onclick="switchTab('overview')" id="tab-overview"
        class="tab-active px-4 py-2 rounded-lg text-sm font-medium transition">📊 Overview</button>
      <button onclick="switchTab('posts')" id="tab-posts"
        class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">📝 Posts</button>
      <button onclick="switchTab('interactions')" id="tab-interactions"
        class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">💬 Interactions</button>
      <button onclick="switchTab('connections')" id="tab-connections"
        class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">🔗 Connections</button>
      <button onclick="switchTab('metrics')" id="tab-metrics"
        class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">📈 Metrics</button>
      <button onclick="switchTab('heatmaps')" id="tab-heatmaps"
        class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">🔥 X KOL Posts Heatmap</button>
      <button onclick="switchTab('engagement')" id="tab-engagement"
        class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">⚡ Engagement Tracker</button>
      <button onclick="switchTab('dms')" id="tab-dms"
        class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">✉️ Scheduled DMs</button>
      <button onclick="switchTab('settings')" id="tab-settings"
        class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">⚙️ Settings</button>
    </div>

    <!-- Tab Content -->
    <div id="content" class="card p-6 scrollbar-thin" style="min-height: 400px;">
      <!-- Dynamic content loaded here -->
    </div>
  </div>

  <!-- Add KOL Modal -->
  <div id="addKolModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50">
    <div class="card p-6 w-full max-w-md mx-4">
      <h3 class="text-lg font-bold text-white mb-4">Add New X KOL</h3>
      <form onsubmit="submitAddKol(event)">
        <div class="space-y-4">
          <div>
            <label class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-2 block">X (Twitter) Profile Link
              *</label>
            <input id="addTwitter" type="url" required pattern="https?://.*"
              class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white text-sm focus:border-blue-500 focus:outline-none transition-all placeholder:text-slate-600"
              placeholder="https://x.com/username">
            <p class="text-[10px] text-slate-500 mt-2 italic">Example: https://x.com/elonmusk</p>
          </div>
        </div>
        <div class="flex gap-3 mt-8">
          <button type="submit"
            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 text-sm font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95">Monitor
            KOL</button>
          <button type="button" onclick="hideAddKol()"
            class="flex-1 bg-slate-700 hover:bg-slate-600 text-white rounded-lg py-3 text-sm font-medium transition-all">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3001/api';

    // --- Supabase Auth Integration ---
    const SUPABASE_URL = 'https://cxjeofxpfzdfqoppkosg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4amVvZnhwZnpkZnFvcHBrb3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzQ5MjMsImV4cCI6MjA4OTU1MDkyM30.TmhKhA5FiUpZqlrt0JwTdFOOvGZIGfvx-IPKGQGx6Kw';

    let supabaseClient = null;
    let currentSession = null;

    // Load Supabase SDK and initialize
    async function initAuth() {
      // Dynamically import Supabase from CDN
      const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
      supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Check for existing session (handles email confirmation redirect too)
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = '/login.html';
        return;
      }
      currentSession = session;

      // Listen for auth changes
      supabaseClient.auth.onAuthStateChange((event, session) => {
        currentSession = session;
        if (!session) window.location.href = '/login.html';
      });

      // Hide loading overlay and start dashboard
      document.getElementById('loginOverlay').classList.add('hidden');
      refreshAll();
    }

    function getUserId() {
      return currentSession?.user?.id || null;
    }

    // ---------- Data Fetchers ----------
    async function fetchJson(path, options = {}) {
      if (!currentSession) {
        window.location.href = '/login.html';
        return;
      }

      // If path starts with /api, prepend the backend URL
      let url = path;
      if (path.startsWith('/api')) {
        url = API + path.replace('/api', '');
      } else if (!path.startsWith('http')) {
        url = `${API}${path}`;
      }

      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${currentSession.access_token}`,
        ...(options.headers || {}),
      };

      try {
        const res = await fetch(url, { ...options, headers });
        if (res.status === 401) {
          window.location.href = '/login.html';
          return;
        }
        if (!res.ok) {
          const errorText = await res.text();
          throw new Error(`API error: ${res.status} ${res.statusText} - ${errorText}`);
        }
        return await res.json();
      } catch (e) {
        console.error('FetchJSON error:', e);
        throw e;
      }
    }

    async function refreshAll() {
      await loadStats();
      await loadTabContent(currentTab);
      document.getElementById('lastUpdate').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
    }

    async function loadStats() {
      const stats = await fetchJson(`${API}/stats`);
      document.getElementById('statKols').textContent = stats.total_kols;
      document.getElementById('statPosts').textContent = stats.posts_today;
      document.getElementById('statInteractions').textContent = stats.interactions_today;
      document.getElementById('statConnections').textContent = stats.connection_changes_today;
      document.getElementById('statTotalPosts').textContent = `total: ${stats.total_posts}`;
    }

    // ---------- Renderers ----------
    function categoryBadge(cat) {
      if (!cat) return '';
      const c = cat.toLowerCase();
      let cls = 'badge-tech';
      if (c.includes('vc') || c.includes('venture')) cls = 'badge-vc';
      else if (c.includes('ai')) cls = 'badge-ai';
      else if (c.includes('product') || c.includes('growth')) cls = 'badge-product';
      else if (c.includes('journal') || c.includes('report')) cls = 'badge-journalism';
      return `<span class="badge ${cls}">${cat}</span>`;
    }

    function truncate(text, len = 120) {
      if (!text) return '-';
      return text.length > len ? text.slice(0, len) + '...' : text;
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    async function renderEngagementTracker(el) {
      const data = await fetchJson(`${API}/twitter_posts?days=90&limit=5000`);

      // Group by KOL
      const byKol = {};
      data.posts.forEach(p => {
        if (!byKol[p.kol_name]) byKol[p.kol_name] = { name: p.kol_name, posts: [], hot: false };

        const delta = (p.likes - p.last_likes) + (p.reposts - p.last_reposts) * 3 + (p.comments - p.last_comments) * 5;
        p.delta = delta;
        if (delta > 5) {
          p.is_hot = true;
          byKol[p.kol_name].hot = true;
        }
        byKol[p.kol_name].posts.push(p);
      });

      const kolNames = Object.keys(byKol).sort();

      el.innerHTML = `
    <div class="flex flex-col gap-6">
      <div class="flex items-center justify-between">
          <h2 class="text-xl font-bold text-white flex items-center gap-2">
            <span class="text-xl">⚡</span> Engagement Tracker
          </h2>
          <button onclick="switchTab('engagement')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2">
            <i data-lucide="refresh-cw" class="w-3 h-3"></i> Sync Data
          </button>
      </div>

      <div id="engagementList" class="space-y-4">
        <!-- Rendered by filterEngagementByKol -->
      </div>
    </div>

    <!-- User List Modal -->
    <div id="userListModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-[100]">
      <div class="card p-6 w-full max-w-lg mx-4 max-h-[80vh] flex flex-col shadow-2xl border-blue-500/30">
        <div class="flex items-center justify-between mb-4">
          <h3 id="userListTitle" class="text-lg font-bold text-white">Interactants</h3>
          <button onclick="hideUserList()" class="text-slate-400 hover:text-white bg-slate-800 rounded-full w-8 h-8 flex items-center justify-center">✕</button>
        </div>
        <div id="userListContent" class="overflow-y-auto scrollbar-thin flex-1 pr-2">
          <p class="text-slate-500 text-center py-4">Loading list...</p>
        </div>
      </div>
    </div>
  `;

      window.engagementData = byKol; // Store for filtering
      filterEngagementByKol();
    }

    function filterEngagementByKol() {
      const container = document.getElementById('engagementList');
      const allData = window.engagementData;
      const kolNames = Object.keys(allData).sort();

      if (kolNames.length === 0) {
        container.innerHTML = '<p class="text-slate-500 text-center py-12">No data available yet.</p>';
        return;
      }

      container.innerHTML = kolNames.map(name => {
        const group = allData[name];
        const posts = group.posts.sort((a, b) => new Date(b.posted_at || b.captured_at) - new Date(a.posted_at || a.captured_at));
        const totalDelta = posts.reduce((sum, p) => sum + p.delta, 0);
        const hasHotPosts = group.hot;

        return `
      <div class="bg-slate-800/40 border border-slate-700 rounded-xl overflow-hidden mb-3 transition-all duration-300">
        <!-- KOL Header (Accordion Trigger) -->
        <div onclick="toggleKolAccordion('${name}')" class="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-700/50 transition select-none">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-700 rounded-lg flex items-center justify-center text-blue-400 font-bold border border-slate-600">
              ${name.charAt(0).toUpperCase()}
            </div>
            <div>
              <div class="flex items-center gap-2">
                <span class="font-bold text-white">${name}</span>
                ${hasHotPosts ? '<span class="text-orange-500 text-xs flex items-center gap-0.5"><span class="animate-pulse">🔥</span> SURGING</span>' : ''}
              </div>
              <div class="text-[10px] text-slate-500 uppercase tracking-wider font-semibold">
                ${posts.length} posts tracked
              </div>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
              <span class="text-xs text-slate-400 block">Recent Activity</span>
              <span class="${totalDelta > 0 ? 'text-emerald-400' : 'text-slate-500'} font-mono text-sm font-bold">
                ${totalDelta > 0 ? '+' : ''}${totalDelta} pts
              </span>
            </div>
            <i data-lucide="chevron-down" id="icon-${name.replace(/\W/g, '')}" class="text-slate-500 transition-transform duration-300"></i>
          </div>
        </div>

        <!-- KOL Posts (Accordion Content) -->
        <div id="content-${name.replace(/\W/g, '')}" class="hidden bg-slate-900/50 border-t border-slate-700/50">
          <div class="p-4 space-y-3">
            ${posts.map(p => {
          const d_likes = p.likes - p.last_likes;
          const d_reposts = p.reposts - p.last_reposts;
          const d_comments = p.comments - p.last_comments;
          const isHot = p.delta > 5;

          return `
                <div class="bg-slate-800/80 rounded-lg p-4 border border-slate-700 relative group transition hover:border-blue-500/50">
                  <div class="flex justify-between items-start mb-2">
                    <span class="text-[10px] text-slate-500">${timeAgo(p.posted_at || p.captured_at)}</span>
                    ${isHot ? '<span class="text-[9px] bg-orange-500/10 text-orange-500 px-1.5 py-0.5 rounded border border-orange-500/20 font-bold uppercase tracking-tighter animate-pulse">Hot Post</span>' : ''}
                  </div>
                  
                  <a href="${p.post_url}" target="_blank" class="block text-sm text-slate-200 mb-4 leading-relaxed hover:text-white transition italic">
                     "${truncate(p.content, 250)}"
                  </a>

                  <div class="flex flex-wrap gap-3 items-center">
                    <div class="flex flex-col bg-slate-900/80 px-3 py-1 rounded-md border border-slate-700 min-w-[70px]">
                      <span class="text-[9px] text-slate-500 uppercase font-bold">Likes</span>
                      <div class="flex items-center justify-between">
                        <span class="text-white font-bold text-xs">${p.likes}</span>
                        ${d_likes > 0 ? `<span class="text-[10px] text-emerald-400 font-bold">+${d_likes}</span>` : ''}
                      </div>
                    </div>

                    <button onclick="viewUserList(${p.id}, 'reposts')" class="flex flex-col bg-slate-900/80 px-3 py-1 rounded-md border border-slate-700 min-w-[85px] hover:border-blue-500 transition text-left">
                      <span class="text-[9px] text-slate-500 uppercase font-bold">Reposts</span>
                      <div class="flex items-center justify-between">
                        <span class="text-white font-bold text-xs">${p.reposts}</span>
                        ${d_reposts > 0 ? `<span class="text-[10px] text-blue-400 font-bold">+${d_reposts}</span>` : ''}
                      </div>
                      <span class="text-[8px] text-blue-500/50 underline mt-0.5">Check users</span>
                    </button>

                    <button onclick="viewUserList(${p.id}, 'replies')" class="flex flex-col bg-slate-900/80 px-3 py-1 rounded-md border border-slate-700 min-w-[85px] hover:border-blue-500 transition text-left">
                      <span class="text-[9px] text-slate-500 uppercase font-bold">Replies</span>
                      <div class="flex items-center justify-between">
                        <span class="text-white font-bold text-xs">${p.comments}</span>
                        ${d_comments > 0 ? `<span class="text-[10px] text-amber-400 font-bold">+${d_comments}</span>` : ''}
                      </div>
                      <span class="text-[8px] text-amber-500/50 underline mt-0.5">Check users</span>
                    </button>

                    <a href="${p.post_url}" target="_blank" class="ml-auto p-1.5 bg-slate-800 rounded-lg hover:bg-slate-700 transition">
                      <i data-lucide="external-link" class="w-4 h-4 text-slate-400"></i>
                    </a>
                  </div>
                </div>
              `;
        }).join('')}
          </div>
        </div>
      </div>
    `;
      }).join('');

      lucide.createIcons();
    }

    function toggleKolAccordion(name) {
      const safeId = name.replace(/\W/g, '');
      const content = document.getElementById(`content-${safeId}`);
      const icon = document.getElementById(`icon-${safeId}`);

      if (content.classList.contains('hidden')) {
        content.classList.remove('hidden');
        icon.style.transform = 'rotate(180deg)';
      } else {
        content.classList.add('hidden');
        icon.style.transform = 'rotate(0deg)';
      }
    }

    async function viewUserList(postId, type) {
      const modal = document.getElementById('userListModal');
      const content = document.getElementById('userListContent');
      const title = document.getElementById('userListTitle');

      title.innerText = type === 'reposts' ? 'Who Reposted?' : 'Who Replied?';
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      content.innerHTML = `
        <div class="flex flex-col items-center py-12 text-slate-500">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-4"></div>
            <p>Fetching interactors from database...</p>
        </div>
    `;

      try {
        const endpoint = type === 'reposts' ? `/api/post_reposts?post_id=${postId}` : `/api/post_replies?post_id=${postId}`;
        const res = await fetch(endpoint);
        const data = await res.json();
        const list = type === 'reposts' ? data.reposts : data.replies;

        if (!list || list.length === 0) {
          content.innerHTML = `
                <div class="text-center py-12">
                    <p class="text-slate-400 mb-2">No usernames captured for this post yet.</p>
                    <p class="text-xs text-slate-600">The scraper visits popular posts every 5-15 mins to collect names.</p>
                </div>
            `;
          return;
        }

        content.innerHTML = `
            <div class="grid grid-cols-2 gap-2 pb-4">
                ${list.map(u => `
                    <a href="https://x.com/${u.username}" target="_blank" class="bg-slate-900/80 p-2.5 rounded border border-slate-700 hover:border-blue-500 hover:bg-slate-800 transition flex items-center justify-between group">
                        <span class="text-blue-400 text-sm font-medium group-hover:text-blue-300">@${u.username}</span>
                        <span class="text-[9px] text-slate-600">${new Date(u.captured_at).toLocaleDateString()}</span>
                    </a>
                `).join('')}
            </div>
            <div class="mt-4 p-3 bg-blue-900/20 rounded-lg border border-blue-900/40">
                <p class="text-[10px] text-blue-300 text-center uppercase tracking-wider font-semibold">Total captured: ${list.length}</p>
            </div>
        `;
      } catch (e) {

    async function saveDms() {
      const rows = document.querySelectorAll('tr[data-kolid]');
      const payload = [];

      // Validation
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const kolId = row.getAttribute('data-kolid');
        const kolName = row.querySelector('td').innerText;
        const text = row.querySelector('.dm-text').value.trim();
        const day = row.querySelector('.dm-day').value;
        const time = row.querySelector('.dm-time').value;

        // Check if partially filled
        const fieldsFilled = (text !== '' ? 1 : 0) + (day !== '' ? 1 : 0) + (time !== '' ? 1 : 0);

        if (fieldsFilled > 0 && fieldsFilled < 3) {
          alert(`Validation Error: For KOL "${kolName}", you must either fill IN ALL THREE fields (Message, Day, Time) or leave them ALL BLANK. Please fix this row and try saving again.`);
          return;
        }

        payload.push({
          id: kolId,
          dm_text: text || null,
          dm_day: day || null,
          dm_time: time || null
        });
      }

      // Submit updates via API
      const btn = document.getElementById('saveDmsBtn');
      const orgText = btn.innerText;
      btn.innerText = 'Saving...';
      btn.disabled = true;

      try {
        // Sequentially update each KOL
        for (const data of payload) {
          let targetUrl = `${API}/kols/${data.id}`;
          // Map to 3000 if using mock local UI
          if (typeof window !== 'undefined' && window.location.port === '8000') {
            targetUrl = window.location.origin.replace(':8000', ':3000') + `/api/kols/${data.id}`;
          }

          const res = await fetch(targetUrl, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              dm_text: data.dm_text,
              dm_day: data.dm_day,
              dm_time: data.dm_time
            })
          });
          if (!res.ok) throw new Error('API Error updating KOL ' + data.id);
        }

        alert('Private Message Schedules saved successfully!');
      } catch (e) {
        alert('Failed to save schedules: ' + e.message);
      } finally {
        btn.innerText = orgText;
        btn.disabled = false;
      }
    }

    async function saveCookies() {
      const auth = document.getElementById('token_auth').value.trim();
      const ct0 = document.getElementById('token_ct0').value.trim();

        });
        alert("Success: " + res.message);
        document.getElementById('token_auth').value = '';
        document.getElementById('token_ct0').value = '';
        renderSettings(document.getElementById('content'));
      } catch (e) { alert("Error updating cookies."); }
    }

    async function saveWebhooks() {
      const data = {
        discord_webhook_posts: document.getElementById('hook_posts').value.trim(),
        discord_webhook_interactions: document.getElementById('hook_interactions').value.trim(),
        discord_webhook_heatmap: document.getElementById('hook_heatmap').value.trim(),
        discord_webhook_following: document.getElementById('hook_following').value.trim(),
        discord_webhook_followers: document.getElementById('hook_followers').value.trim()
      };

      try {
        const res = await fetchJson(`/api/auth/profile?user_id=${getUserId()}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        alert("Success: Webhooks saved.");
      } catch (e) { alert("Error saving webhooks."); }
    }

    // ---------- Actions ----------
    function showAddKol() { document.getElementById('addKolModal').classList.remove('hidden'); document.getElementById('addKolModal').classList.add('flex'); }
    function hideAddKol() { document.getElementById('addKolModal').classList.add('hidden'); document.getElementById('addKolModal').classList.remove('flex'); }

    async function submitAddKol(e) {
      e.preventDefault();
      const url = document.getElementById('addTwitter').value.trim();
      if (!url) return;

      // Extract username from URL for initial name
      let name = url.split('/').pop() || 'X KOL';
      if (name.includes('?')) name = name.split('?')[0];

      const body = {
        name: name,
        twitter_url: url,
        category: 'X KOL',
        user_id: getUserId()
      };

      let targetUrl = `${API}/kols`;
      if (window.location.origin.includes(':8000')) {
        targetUrl = window.location.origin.replace(':8000', ':3000') + '/api/kols';
      }

      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerText;
      btn.innerText = 'Adding...';
      btn.disabled = true;

      try {
        const res = await fetch(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error("API failed");
        hideAddKol();
        refreshAll();
        document.getElementById('addTwitter').value = '';
      } catch (err) {
        alert("Failed to add KOL. Please check the URL.");
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }

    async function deleteKol(id) {
      if (!confirm('Remove this KOL from monitoring?')) return;
      let targetUrl = `${API}/kols/${id}`;
      if (window.location.origin.includes(':8000')) {
        targetUrl = window.location.origin.replace(':8000', ':3000') + `/api/kols/${id}`;
      }
      await fetch(targetUrl, { method: 'DELETE' });
      renderSettings(document.getElementById('content'));
    }

    async function removeAllKols() {
      if (!confirm('DANGER: This will delete ALL your tracked KOLs and their historical data. Are you sure?')) return;

      let targetUrl = `${API}/kols/all?user_id=${getUserId()}`;
      if (window.location.origin.includes(':8000')) {
        targetUrl = window.location.origin.replace(':8000', ':3000') + `/api/kols/all?user_id=${getUserId()}`;
      }

      try {
        const res = await fetch(targetUrl, { method: 'DELETE' });
        if (res.ok) {
          alert("All KOLs have been removed.");
          renderSettings(document.getElementById('content'));
        }
      } catch (e) { alert("Error removing all KOLs."); }
    }

    async function bulkImportKols() {
      const text = document.getElementById('bulkImport').value.trim();
      if (!text) return;

      const lines = text.split('\n');
      let imported = 0;

      let targetUrl = `${API}/kols`;
      if (window.location.origin.includes(':8000')) {
        targetUrl = window.location.origin.replace(':8000', ':3000') + '/api/kols';
      }

      for (const line of lines) {
        const url = line.trim();
        if (!url || !url.startsWith('http')) continue;

        // Extract username from URL for initial name
        let name = url.split('/').pop() || 'X KOL';
        if (name.includes('?')) name = name.split('?')[0];

        const body = {
          user_id: getUserId(),
          name: name,
          twitter_url: url,
          category: 'X KOL'
        };

        await fetch(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        imported++;
      }

      alert(`Successfully imported ${imported} X profiles. Scraper will fetch full details on next run.`);
      document.getElementById('bulkImport').value = '';
      renderSettings(document.getElementById('content'));
    }

    function filterKols() {
      const q = document.getElementById('searchKol').value.toLowerCase();
      const rows = document.querySelectorAll('#kolTableBody tr');
      rows.forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    }

    // ---------- Init ----------
    (async () => {
      // Initialize Supabase auth, then load dashboard
      initAuth();
    })();
  </script>

</body>
